name: Benchmark (PR check)

# Runs benchmarks on PRs for regression detection.
# Deployment of benchmark reports is handled by deploy.yml (push to main only).

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benchmarks
        run: cargo bench
