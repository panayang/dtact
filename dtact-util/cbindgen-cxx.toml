language = "C"
cpp_compat = true
include_guard = "DTACT_UTIL_HPP"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
tab_width = 4
line_length = 100
documentation = true
documentation_style = "cxx"
usize_is_size_t = true

[defines]
"target_os = windows" = "DTACT_WINDOWS"
"target_os = linux" = "DTACT_LINUX"
"target_os = macos" = "DTACT_MACOS"

[export]
include = ["dtact"]
exclude = []
prefix = ""
item_types = [
    "globals",
    "enums",
    "structs",
    "unions",
    "typedefs",
    "opaque",
    "functions",
    "constants",
]

[export.rename]

[export.body]

[export.mangle]

[fn]
rename_args = "GeckoCase"
prefix = ""
postfix = ""
args = "Auto"
sort_by = "Name"

[struct]
rename_fields = "GeckoCase"
derive_constructor = true
derive_eq = true
derive_neq = true
derive_lt = true
derive_lte = true
derive_gt = true
derive_gte = true

[enum]
rename_variants = "GeckoCase"
prefix_with_name = true
derive_helper_methods = true
derive_const_casts = true
derive_mut_casts = true
cast_assert_name = "ASSERT"
derive_tagged_enum_destructor = true
derive_tagged_enum_copy_constructor = true
derive_tagged_enum_copy_assignment = true
private_default_tagged_enum_constructor = true

[const]
allow_static_const = true
allow_constexpr = true
sort_by = "Name"

[macro_expansion]
bitflags = true

[parse]
parse_deps = true
include = []
exclude = []
clean = false
extra_bindings = []

[parse.expand]
# NOTE: leave `crates` empty. Setting it to `["dtact-util"]` makes cbindgen
# shell out to the `cargo-expand` subcommand (which additionally needs a
# nightly toolchain) to macro-expand the crate before parsing it. Without
# `cargo-expand` installed, that expansion step fails silently and cbindgen
# falls back to a near-empty parse (`dtact_util.h` shrinks to just the
# handful of items it can see without expansion, e.g. `MAX_LISTENERS`,
# dropping every `extern "C"` function and opaque type). Verified locally:
# re-enabling this without `cargo-expand` present reproduces exactly that
# collapse. If macro-generated types ever need cbindgen visibility again,
# prefer spelling them out as plain `pub struct`s (see
# `process::native::DtactChildStdin`/`Stdout`/`Stderr`, which used to be
# generated by a `child_pipe!` macro for this exact reason) over turning
# this back on.
crates = []
all_features = false
default_features = true
features = []
